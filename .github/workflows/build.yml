name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install SDK & Accept Licenses
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Generate debug keystore
        run: |
          if [ ! -f app/debug.keystore ]; then
            keytool -genkeypair -v -storetype PKCS12 -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build MDM APK
        run: chmod +x gradlew && ./gradlew :app:assembleRelease --no-daemon

      - name: Upload MDM APK
        uses: actions/upload-artifact@v4
        with:
          name: MDM-APK
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
